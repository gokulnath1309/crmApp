<body class="mesh-bg min-h-screen flex flex-col justify-between items-center p-margin-mobile md:p-margin-desktop overflow-x-hidden">

<header class="w-full flex flex-col items-center mt-xl md:mt-2xl animate-in fade-in slide-in-from-top-4 duration-700">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">dataset</span>
</div>

                CRM Pro

</div>
<p class="mt-xs font-body-md text-body-md text-on-surface-variant max-w-[280px] text-center">

<!-- Center: Sign Up Card -->
<main class="w-full max-w-md my-xl animate-in fade-in zoom-in-95 duration-500 delay-150">
<div class="glass-card rounded-xl p-lg md:p-xl">
<div class="mb-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs">Create Account</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your details to get started with the workspace.</p>
</div>
<form class="space-y-md" id="signup-form">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="full_name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all placeholder:text-outline-variant" id="full_name" name="full_name" placeholder="John Doe" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-10 pr-12 py-2.5 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all placeholder:text-outline-variant" id="password" name="password" oninput="updateStrength(this.value)" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined text-[20px]" id="eye-icon-password">visibility</span>
</button>
</div>
<!-- Strength Indicator -->
<div class="pt-1 flex flex-col gap-1.5">
<div class="flex gap-1">
<div class="strength-bar flex-1 bg-surface-container" id="strength-1"></div>
<div class="strength-bar flex-1 bg-surface-container" id="strength-2"></div>
<div class="strength-bar flex-1 bg-surface-container" id="strength-3"></div>
<div class="strength-bar flex-1 bg-surface-container" id="strength-4"></div>
</div>
<p class="font-label-md text-[10px] text-on-surface-variant uppercase tracking-wider" id="strength-text">Security: Use 8+ characters</p>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-xs">

<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock_reset</span>
<input class="w-full pl-10 pr-12 py-2.5 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all placeholder:text-outline-variant" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" onclick="togglePassword('confirm_password')" type="button">

</button>
</div>
</div>

</div>
<label class="font-body-md text-body-md text-on-surface-variant leading-tight" for="terms">
                        I agree to the <a class="text-primary font-medium hover:underline underline-offset-4" href="#">Terms of Service</a> and <a class="text-primary font-medium hover:underline underline-offset-4" href="#">Privacy Policy</a>.
                    </label>

<!-- Social Provider Divider -->

<p class="font-body-md text-body-md text-on-surface-variant">
            Already have an account? 
            <a class="text-primary font-semibold hover:underline underline-offset-4 ml-1" href="#">Sign In</a>
</p>
<div class="flex gap-lg opacity-50 hover:opacity-100 transition-opacity">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary" href="#">Help Center</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary" href="#">Contact Sales</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary" href="#">Legal</a>
</div>
</footer>
<script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById('eye-icon-' + inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        function updateStrength(value) {
            const strength1 = document.getElementById('strength-1');
            const strength2 = document.getElementById('strength-2');
            const strength3 = document.getElementById('strength-3');
            const strength4 = document.getElementById('strength-4');
            const strengthText = document.getElementById('strength-text');

            // Reset
            [strength1, strength2, strength3, strength4].forEach(bar => {
                bar.className = 'strength-bar flex-1 bg-surface-container';
            });
            strengthText.className = "font-label-md text-[10px] text-on-surface-variant uppercase tracking-wider";
            strengthText.innerText = "Security: Use 8+ characters";

            if (value.length === 0) return;

            let score = 0;
            if (value.length >= 8) score++;
            if (/[A-Z]/.test(value)) score++;
            if (/[0-9]/.test(value)) score++;
            if (/[^A-Za-z0-9]/.test(value)) score++;

            const colors = ['bg-error', 'bg-tertiary-container', 'bg-secondary-container', 'bg-green-500'];
            const labels = ['Weak', 'Fair', 'Strong', 'Very Strong'];

            for (let i = 0; i < score; i++) {
                document.getElementById(`strength-${i+1}`).classList.remove('bg-surface-container');
                document.getElementById(`strength-${i+1}`).classList.add(colors[score-1]);
            }
            
            if (score > 0) {
                strengthText.innerText = labels[score-1];
                // Text color matching the bar level roughly
                if (score === 1) strengthText.classList.add('text-error');
                if (score === 2) strengthText.classList.add('text-tertiary');
                if (score === 3) strengthText.classList.add('text-secondary');
                if (score === 4) strengthText.classList.add('text-green-600');
            }
        }

        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Creating...`;
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Welcome!`;
                btn.classList.replace('bg-primary', 'bg-green-600');
            }, 1500);
        });
    </script>
